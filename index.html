<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Petty Cash App Live v10.51-transactionid-map-sync</title>

  <meta name="theme-color" content="#2563eb" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <style>
    :root{
      --bg:#f5f7fb; --card:#fff; --text:#1f2937; --muted:#6b7280; --line:#e5e7eb;
      --primary:#2563eb; --primary-dark:#1d4ed8; --success:#15803d; --danger:#dc2626;
      --shadow:0 10px 30px rgba(15,23,42,.08); --radius:18px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);overflow-anchor:none}
    html{scroll-behavior:auto;overscroll-behavior-y:contain}
    input,select,textarea,button{-webkit-tap-highlight-color:transparent}
    input,select,textarea{font-size:16px}
    .app-rendering *{transition:none!important}
    .app{max-width:min(1500px,96vw);margin:0 auto;padding:20px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px}
    .brand{font-size:24px;font-weight:700}
    .muted{color:var(--muted)}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
    .grid{display:grid;gap:16px}
    .grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}
    @media (max-width:900px){.grid-3,.grid-4{grid-template-columns:1fr}.topbar{flex-direction:column;align-items:stretch}}
    @media (min-width:1200px){.app{padding:24px}.card{padding:20px}.grid-3{grid-template-columns:repeat(3,minmax(280px,1fr))}.grid-4{grid-template-columns:repeat(4,minmax(220px,1fr))}table{font-size:13px}th,td{padding:10px 8px}}
    h1,h2,h3{margin:0 0 10px}
    .stat{display:flex;flex-direction:column;gap:8px}
    .stat .value{font-size:28px;font-weight:700}
    .success{color:var(--success)} .danger{color:var(--danger)}
    input,select,textarea,button{width:100%;padding:12px 14px;border-radius:12px;border:1px solid #cbd5e1;font-size:14px;font-family:inherit}
    textarea{min-height:90px;resize:vertical}
    button{border:none;background:var(--primary);color:#fff;cursor:pointer;font-weight:700}
    button:hover{background:var(--primary-dark)}
    button.secondary{background:#e5e7eb;color:#111827}
    button.secondary:hover{background:#d1d5db}
    button.success-btn{background:var(--success)}
    button.danger-btn{background:var(--danger)}
    button:disabled{opacity:.65;cursor:not-allowed}
    .row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .row-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    @media (max-width:700px){.row,.row-3{grid-template-columns:1fr}}
    .stack{display:flex;flex-direction:column;gap:12px}
    .actions{display:flex;gap:10px;flex-wrap:wrap}.actions>*{flex:1 1 140px}
    .hidden{display:none!important}
    .pill{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:#eff6ff;color:#1d4ed8;font-size:12px;font-weight:700}
    table{width:100%;border-collapse:collapse;font-size:14px}
    th,td{text-align:left;padding:12px 10px;border-bottom:1px solid var(--line);vertical-align:top}
    th{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.04em}
    .entry-type{font-weight:700;text-transform:uppercase;font-size:12px}.credit{color:var(--success)}.debit{color:var(--danger)}
    .nav{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
    .nav button.active{background:#111827;color:#fff}
    .login-wrap{min-height:100vh;display:grid;place-items:center;padding:24px}
    .login-box{width:min(460px,100%)}
    .small{font-size:12px}
    .banner{padding:12px 14px;border-radius:14px;margin-bottom:16px;font-size:14px}
    .banner.info{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
    .banner.ok{background:#ecfdf5;color:#166534;border:1px solid #bbf7d0}
    .banner.error{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
    .right{text-align:right}.section-title{margin-bottom:14px}.nowrap{white-space:nowrap}
.my-entries-table-wrap{display:block}
.my-entries-mobile-list{display:none}
.my-entry-card{border:1px solid var(--line);border-radius:18px;padding:14px;background:#fff;margin-bottom:12px;box-shadow:var(--shadow)}
.my-entry-date{font-size:13px;color:var(--muted);margin-bottom:12px}
.my-entry-card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px}
.my-entry-left{min-width:0;flex:1}
.my-entry-chip{display:inline-block;padding:8px 12px;border-radius:12px;background:#eef2ff;color:#4f46e5;font-weight:700;margin-bottom:10px}
.my-entry-remark{font-size:16px;line-height:1.35;word-break:break-word}
.my-entry-side{text-align:right;min-width:110px}
.my-entry-amount{font-size:22px;font-weight:700}
.my-entry-balance{font-size:12px;color:var(--muted);margin-top:8px}
.my-entry-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.my-entry-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.my-entry-value{font-size:14px;word-break:break-word}
.my-entry-complete{margin-top:12px}
.recent-entries-table-wrap{display:block}
.recent-entries-mobile-list{display:none}
.recent-entry-card{border:1px solid var(--line);border-radius:18px;padding:14px;background:#fff;margin-bottom:12px;box-shadow:var(--shadow)}
.recent-entry-date{font-size:13px;color:var(--muted);margin-bottom:12px}
.recent-entry-card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px}
.recent-entry-left{min-width:0;flex:1}
.recent-entry-chip{display:inline-block;padding:8px 12px;border-radius:12px;background:#eef2ff;color:#4f46e5;font-weight:700;margin-bottom:10px}
.recent-entry-remark{font-size:16px;line-height:1.35;word-break:break-word}
.recent-entry-side{text-align:right;min-width:110px}
.recent-entry-amount{font-size:22px;font-weight:700}
.recent-entry-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.recent-entry-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.recent-entry-value{font-size:14px;word-break:break-word}
.admin-balance-card{border:1px solid var(--line);border-radius:18px;padding:14px;background:#fff;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:10px;text-align:left;color:var(--text);transition:background-color .18s ease,border-color .18s ease,box-shadow .18s ease,transform .18s ease;-webkit-tap-highlight-color:transparent}
.admin-balance-card *{color:inherit}
.admin-balance-card:hover,.admin-balance-card:focus,.admin-balance-card:active{background:#eff6ff;border-color:#bfdbfe;box-shadow:0 0 0 3px rgba(37,99,235,.10), var(--shadow);outline:none;transform:translateY(-1px);color:var(--text)}
.admin-balance-name{font-size:18px;font-weight:700;line-height:1.3;word-break:break-word;color:#111827}
.admin-balance-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.admin-balance-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.admin-balance-value{font-size:14px;word-break:break-word;color:#111827}
.admin-balance-amount{font-size:24px;font-weight:700;line-height:1.2;word-break:break-word}

.users-table-wrap{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
.users-mobile-list{display:none}
.user-mobile-card{border:1px solid var(--line);border-radius:18px;padding:14px;background:#fff;margin-bottom:12px;box-shadow:var(--shadow)}
.user-mobile-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px}
.user-mobile-name{font-size:17px;font-weight:700;line-height:1.3;word-break:break-word;color:#111827}
.user-mobile-balance{font-size:18px;font-weight:700;text-align:right;white-space:nowrap}
.user-mobile-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.user-mobile-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.user-mobile-value{font-size:14px;word-break:break-word}
.recent-entry-user{font-size:15px;font-weight:600;line-height:1.35;word-break:break-word;color:#111827}

.tx-summary-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:16px;margin-bottom:12px}
@media (max-width:700px){.tx-summary-grid{grid-template-columns:1fr}}

.top-actions-wrap{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.notice-bell-wrap{position:relative}
.notice-bell{position:relative;min-width:52px;width:auto;padding:12px 14px;background:#fff;color:#111827;border:1px solid var(--line);box-shadow:var(--shadow)}
.notice-enable-btn{min-width:170px;width:auto;padding:12px 14px;background:#fff;color:#111827;border:1px solid var(--line);box-shadow:var(--shadow)}
.notice-enable-btn:hover{background:#f8fafc}
.notice-enable-btn.active{background:#ecfdf5;color:#166534;border-color:#bbf7d0}

.install-app-btn{min-width:140px;width:auto;padding:12px 14px;background:#fff;color:#111827;border:1px solid var(--line);box-shadow:var(--shadow)}
.install-app-btn:hover{background:#f8fafc}
.install-app-btn.hidden{display:none!important}
.notice-bell:hover{background:#f8fafc}
.notice-badge{position:absolute;top:-6px;right:-6px;min-width:22px;height:22px;padding:0 6px;border-radius:999px;background:var(--danger);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:700}
.notice-panel{position:absolute;right:0;top:calc(100% + 8px);width:min(420px,92vw);max-height:75vh;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:12px;z-index:50}
.notice-panel-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}
.notice-panel-title{font-weight:700}
.notice-group-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:10px 10px 4px;border-top:1px solid var(--line);background:#f9fafb}
.check-row{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:14px}.check-row input{width:18px;height:18px;flex:0 0 auto}
.notice-clear-btn{width:auto;padding:8px 10px;border-radius:10px;background:#e5e7eb;color:#111827}
.notice-item{border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:#fff;margin-bottom:10px;cursor:pointer}
.notice-item:last-child{margin-bottom:0}
.notice-item:hover{background:#f8fafc}
.notice-item.notice-opening{background:#eef2ff;border-color:#93c5fd;opacity:.75;transform:scale(.99);transition:background .08s ease,opacity .08s ease,transform .08s ease}
.notice-item.notice-opening::after{content:"Opening...";display:block;margin-top:6px;font-size:12px;font-weight:700;color:#2563eb}
.notice-title{font-weight:700;margin-bottom:4px}
.notice-meta{font-size:12px;color:var(--muted);margin-top:6px}
.notice-empty{color:var(--muted);font-size:14px;padding:6px 2px}
.blink-highlight{animation:blinkHighlight 1.2s ease-in-out 0s 3}
@keyframes blinkHighlight{
  0%,100%{box-shadow:0 0 0 0 rgba(37,99,235,0);background:transparent}
  50%{box-shadow:0 0 0 4px rgba(37,99,235,.28);background:#eff6ff}
}

.queue-details{border:1px solid var(--line);border-radius:14px;background:#fff;padding:12px;margin-top:10px}
.queue-item{border-top:1px solid var(--line);padding:10px 0;font-size:13px}
.queue-item:first-child{border-top:none}
.queue-title{font-weight:700;margin-bottom:4px}
.queue-meta{color:var(--muted);font-size:12px;word-break:break-word}
.queue-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.queue-actions button{width:auto;min-width:130px}
@media (max-width:700px){
  .my-entries-table-wrap{display:none}
  .my-entries-mobile-list{display:block}
  .recent-entries-table-wrap{display:none}
  .recent-entries-mobile-list{display:block}
  .my-entry-grid{grid-template-columns:1fr}
  .recent-entry-grid{grid-template-columns:1fr}
  .admin-balance-grid{grid-template-columns:1fr}
  .users-table-wrap{display:none}
  .users-mobile-list{display:block}
  .user-mobile-grid{grid-template-columns:1fr 1fr}
  .top-actions-wrap{width:100%}
  .top-actions-wrap > *{flex:1 1 100px}
  .notice-bell-wrap{flex:0 0 auto}
  .notice-bell{min-width:48px;padding:12px}
  .notice-panel{
    position:fixed;
    top:88px;
    left:50%;
    right:auto;
    transform:translateX(-50%);
    width:min(92vw,360px);
    max-height:60vh;
    padding:10px;
    z-index:1000;
  }
}
  </style>
</head>
<body>
  <div id="loginView" class="login-wrap hidden">
    <div class="login-box card stack">

        <h1>Petty Cash App Live</h1>

  <script src="https://www.gstatic.com/firebasejs/12.2.0/firebase-app-compat.js"></script>

  <script>
    const STORAGE_KEY = 'petty_cash_app_v5_live_fixed';
    const APP_VERSION = 'v10.51-transactionid-map-sync';
    const CREDENTIALS_STORAGE_KEY = STORAGE_KEY + '_credentials';
    const NOTIFICATION_OPEN_STORAGE_KEY = STORAGE_KEY + '_pending_notification_open';
    const SA_TIMEZONE = 'Africa/Johannesburg';
    const LOGIN_DAILY_CHECK_HOUR = 21; // 21:00 SAST daily login re-check
    const HARDCODED_API_URL = 'https://script.google.com/macros/s/AKfycbwqC1SubI9C_MRqYCAbUCNMhJjwhKUiDaKhxvZxWl8x623YFG1u_4LcCZNQKnGidxR-/exec';
    const LOGIN_BANNER_DEFAULT = 'Login to continue.';
    const firebaseConfig = {
  apiKey: "AIzaSyCqARi_5Aj06ZE2GRFve_u75u9zI9RRd9c",
  authDomain: "pettycash-earthlabs.firebaseapp.com",
  projectId: "pettycash-earthlabs",
  storageBucket: "pettycash-earthlabs.firebasestorage.app",
  messagingSenderId: "477886037099",
  appId: "1:477886037099:web:1e3f284c52d1f98da5852e",
  measurementId: "G-WPFSZTCEDD"
};
    const FCM_VAPID_PUBLIC_KEY = 'BGsEeKK2g7Q0UssgyH4k0NHztNYk3oeZO9J1_mMJb3IF_0DeQ_vs7_pbng5GgGcLc35lBtA9nFj4Y1dJyQ3XQ-g';

    const SYNC_INTERVAL_MS = 15 * 60 * 1000;
    const state = {
      selectedAdminUserId: 'all',
      apiUrl: HARDCODED_API_URL,
      token: '',
      user: null,
      sessionExpiresAt: '',
      lastLoginValidationDate: '',
      lastSyncAt: '',
      lastSyncRevision: 0,
      syncHealth: {},
      backendVersion: '',
      indexedDbStatus: 'Unknown',
      migrationStatus: '',
      migrationDate: '',
      migrationMessage: '',
      migrationCounts: { transactions: 0, users: 0, pendingOps: 0 },
      settings: { allowBackdate: 'no', maxBackdateDays: '3', currency: 'ZAR' },
      adminNotificationPreferences: { new_request: 'yes', approve_request: 'yes', mark_paid: 'yes', complete_expense: 'yes', admin_payment_reminder: 'yes', custom_message: 'yes' },
      categories: ['fuel','transport','stationery','meals','accommodation','parts','oil','maintenance','site materials','office supplies','other'],
      users: [],
      plants: [],
      plantsUpdatedAt: '',

      pendingFiles: {},
      pendingPaymentFiles: {},
      pendingRequestFiles: [],
      pendingRequestFile: null,
      requestDraft: null,
      pendingOps: [],
      syncTimerId: null,
      isSyncing: false,
      dismissedNotifications: [],
      customNotifications: [],
      notificationsOpen: false,
      pendingBlinkId: '',
      sessionTimerId: null,
      browserNotificationsEnabled: false,
      shownBrowserNotificationIds: [],
      fcmToken: '',
      pushDeviceId: '',
      lastLoginBanner: LOGIN_BANNER_DEFAULT,
      lastLoginBannerType: 'info',
      currentScreen: 'dashboard',
      lastInteractionAt: 0,
      lastRenderAt: 0
    };

    function loadCredentialBackup(){
      try {
        const saved = JSON.parse(localStorage.getItem(CREDENTIALS_STORAGE_KEY) || '{}');
        if (!state.savedUsername && saved.savedUsername) state.savedUsername = saved.savedUsername || '';
        if (!state.savedPin && saved.savedPin) state.savedPin = saved.savedPin || '';
      } catch (e) {}
    }
    function saveCredentialBackup(){
      try {
        localStorage.setItem(CREDENTIALS_STORAGE_KEY, JSON.stringify({
          savedUsername: state.savedUsername || '',
          savedPin: state.savedPin || ''
        }));
      } catch (e) {}
    }
    function clearCredentialBackup(){
      try { localStorage.removeItem(CREDENTIALS_STORAGE_KEY); } catch (e) {}
    }

    function loadLocal(){
      try{
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        state.apiUrl = HARDCODED_API_URL;
        state.token = saved.token || '';
        state.user = saved.user || null;
        state.savedUsername = saved.savedUsername || '';
        state.savedPin = saved.savedPin || '';
        state.sessionExpiresAt = saved.sessionExpiresAt || '';
        state.lastLoginValidationDate = saved.lastLoginValidationDate || '';
        state.lastSyncAt = saved.lastSyncAt || '';
        state.lastSyncRevision = Number(saved.lastSyncRevision || 0);
        state.syncHealth = saved.syncHealth || state.syncHealth || {};
        state.backendVersion = saved.backendVersion || state.backendVersion || '';
        state.migrationStatus = saved.migrationStatus || state.migrationStatus || '';
        state.migrationDate = saved.migrationDate || state.migrationDate || '';
        state.migrationMessage = saved.migrationMessage || state.migrationMessage || '';
        state.migrationCounts = saved.migrationCounts || state.migrationCounts || { transactions: 0, users: 0, pendingOps: 0 };
        state.dismissedNotifications = Array.isArray(saved.dismissedNotifications) ? saved.dismissedNotifications : [];
        state.customNotifications = Array.isArray(saved.customNotifications) ? saved.customNotifications : [];
        state.browserNotificationsEnabled = !!saved.browserNotificationsEnabled;
        state.shownBrowserNotificationIds = Array.isArray(saved.shownBrowserNotificationIds) ? saved.shownBrowserNotificationIds : [];
        state.fcmToken = saved.fcmToken || '';
        state.pushDeviceId = saved.pushDeviceId || state.pushDeviceId || '';
        state.pendingFiles = {};
        state.pendingPaymentFiles = {};
        state.pendingRequestFiles = [];
        state.pendingRequestFile = null;
        state.pendingOps = Array.isArray(saved.pendingOps) ? saved.pendingOps : [];
        state.transactions = Array.isArray(saved.transactions) ? saved.transactions : [];
        state.users = Array.isArray(saved.users) ? saved.users : [];
        state.plants = Array.isArray(saved.plants) ? saved.plants : [];
        state.plantsUpdatedAt = saved.plantsUpdatedAt || state.plantsUpdatedAt || '';
        state.categories = Array.isArray(saved.categories) && saved.categories.length ? saved.categories : state.categories;
        state.settings = saved.settings && typeof saved.settings === 'object' ? Object.assign({}, state.settings, saved.settings) : state.settings;
        state.adminNotificationPreferences = saved.adminNotificationPreferences && typeof saved.adminNotificationPreferences === 'object' ? Object.assign({}, state.adminNotificationPreferences, saved.adminNotificationPreferences) : state.adminNotificationPreferences;
      }catch(e){}
      loadCredentialBackup();
      cleanupNonCriticalQueue_({ silent: true });
      cleanupStaleQueueItems_({ silent: true });
    }
    function saveLocal(){
      const smallState = {
        apiUrl: HARDCODED_API_URL,
        token: state.token,
        user: state.user,
        savedUsername: state.savedUsername || '',
        savedPin: state.savedPin || '',
        sessionExpiresAt: state.sessionExpiresAt || '',
        lastLoginValidationDate: state.lastLoginValidationDate || '',
        lastSyncAt: state.lastSyncAt || '',
        lastSyncRevision: Number(state.lastSyncRevision || 0),
        syncHealth: state.syncHealth || {},

    async function flushPendingOperations(options){
      const opts = options || {};
      cleanupNonCriticalQueue_({ silent: true });
      cleanupStaleQueueItems_({ silent: true });
      if (state.isSyncing || !state.token || !state.pendingOps.length || !canReachServer()) {
        updateSyncState();
        return;
      }
      state.isSyncing = true;
      updateSyncState('Syncing...', 'info');
      try {
        const originalOps = (state.pendingOps || []).slice();
        const remaining = [];
        const errors = [];
        let clearedStale = 0;

        // Phase 2: send queue items in one backend batch where possible.
        try {
          const batchResult = await apiCall('batchSyncActions', {
            operations: originalOps.map(function(op){
              return { opId: op.opId || '', action: op.action || '', data: op.data || {} };
            })
          }, { skipOfflineGuard: true });
          const results = Array.isArray(batchResult.results) ? batchResult.results : [];
          const byOpId = {};
          results.forEach(function(r){ byOpId[String(r.opId || '')] = r; });
          originalOps.forEach(function(op){
            const r = byOpId[String(op.opId || '')] || null;
            if (r && r.ok) {
              const result = r.result || {};
              if (op.action === 'syncEntries') {
                applySyncedTransactionIdMappings_(result);
                applySyncedTransactionIdMappings_(result);
                markLocalTransactionsSynced_((result && result.synced) || []);
                const rejectedMessage = getSyncRejectedMessage_(result);
                if (rejectedMessage) {
                  op.lastError = rejectedMessage;
                  op.lastAttemptAt = nowSAIso();
                  op.attempts = Number(op.attempts || 0) + 1;
                  remaining.push(op);
                  errors.push(rejectedMessage);
                  return;
                }
              }
              if (result && result.transaction) updateTransactionInState(result.transaction);
              if (result && result.deletedTransactionId) {
                state.transactions = (state.transactions || []).filter(function(t){ return String(t.TransactionID || '') !== String(result.deletedTransactionId || ''); });
                removeQueuedTransactionItems_(result.deletedTransactionId);
              }
              removePendingFileForOp(op);
            } else {
              const msg = (r && r.message) ? r.message : 'Batch sync failed.';
              op.lastError = msg;
              op.lastAttemptAt = nowSAIso();
              op.attempts = Number(op.attempts || 0) + 1;
              if (isStaleQueueError_(msg, op)) {
                removePendingFileForOp(op);
                clearedStale++;
              } else {
                remaining.push(op);
                errors.push(msg);
              }
            }
          });
          state.lastSyncRevision = Number(batchResult.syncRevision || state.lastSyncRevision || 0);
        } catch (batchErr) {
          // Fallback to the old one-by-one path if the backend has not been redeployed yet.
          for (let i = 0; i < originalOps.length; i++) {
            const op = originalOps[i];
            try {
              const result = await apiCall(op.action, op.data, { skipOfflineGuard: true });
              if (op.action === 'syncEntries') {
                applySyncedTransactionIdMappings_(result);
                markLocalTransactionsSynced_((result && result.synced) || []);
                const rejectedMessage = getSyncRejectedMessage_(result);
                if (rejectedMessage) throw new Error(rejectedMessage);
              }
              if (result && result.transaction) updateTransactionInState(result.transaction);
              removePendingFileForOp(op);
            } catch (err) {
              const msg = (err && err.message) ? err.message : String(err || 'Sync failed');
              op.lastError = msg;
              op.lastAttemptAt = nowSAIso();
              op.attempts = Number(op.attempts || 0) + 1;
              if (!canReachServer()) {
                remaining.push(op, ...originalOps.slice(i + 1));
                errors.push('No internet connection.');
                break;
              }
              if (isStaleQueueError_(msg, op)) {
                removePendingFileForOp(op);
                clearedStale++;
                continue;
              }
              remaining.push(op);
              errors.push(msg);
            }
          }
        }

        state.pendingOps = remaining;
        saveLocal();

        if (!opts.silent) {
          if (remaining.length && errors.length) {
            setBanner(remaining.length + ' queued item(s) still not synced: ' + errors[0], 'error');
          } else if (!remaining.length) {
            setBanner(clearedStale ? 'Sync complete. Cleared ' + clearedStale + ' stale queue item(s).' : 'Sync complete. Queue cleared.', 'ok');
          } else if (clearedStale) {
            setBanner('Cleared ' + clearedStale + ' stale queue item(s).', 'ok');
          }
        }
      } finally {
        state.isSyncing = false;
        updateSyncState();
      }
      if (state.token && canReachServer()) {
        try { await refreshFromBackend(false, { silent: true, skipQueueFlush: true }); } catch (e) {}
      }
    }

    async function loginWithSavedCredentials_(showErrors){
      if(!state.apiUrl) state.apiUrl = HARDCODED_API_URL;
      const username = String(state.savedUsername || '').trim();
      const pin = String(state.savedPin || '').trim();
      if(!username || !pin) throw new Error('Saved login details are missing.');
      const response = await fetch(state.apiUrl, {
        method:'POST',
        headers:{ 'Content-Type':'text/plain;charset=utf-8' },
        body: JSON.stringify({ action:'login', data:{ username, pin } })
      });
      const text = await response.text();
      let json;
      try { json = JSON.parse(text); } catch(e) { throw new Error(explainInvalidJsonResponse_(text, 'Could not login.')); }
      if(!json.ok) throw new Error(json.message || 'Login failed');
      state.token = json.token;
      state.user = json.user;
      state.sessionExpiresAt = '';
      state.lastLoginValidationDate = todaySAKey_();
      saveCredentialBackup();
      saveLocal();
      return json;
    }

    async function ensureActiveSession_(showErrors){
      if (sessionValid() && !dailyLoginCheckDue_()) return true;
      if (!state.apiUrl || !state.savedUsername || !state.savedPin) return !!state.token;
      try {
        await loginWithSavedCredentials_(showErrors);
        state.lastLoginValidationDate = todaySAKey_();
        saveLocal();
        return true;
      } catch (err) {
        if (dailyLoginCheckDue_()) {
          state.token = '';
          state.user = null;
          state.lastSyncAt = '';
          saveLocal();
        }
        if (showErrors) {
          const banner = document.getElementById('loginBanner');
          if (banner) {
            banner.className='banner error';
            banner.textContent = 'Daily 21:00 login check failed. Please login again.';
          }
        }
        return false;
      }
    }

    async function keepSessionAlive_(options){
      const opts = options || {};
      if (!state.apiUrl || !state.savedUsername || !state.savedPin) return false;
      try {
        const ok = await ensureActiveSession_(!!opts.showErrors);
        if (ok && state.user) {
          if (document.getElementById('appView').classList.contains('hidden')) renderApp();
          return true;

      } catch (e) {}
      return false;

      const ok = await keepSessionAlive_({ showErrors: false });

    async function apiCall(action, data, options){
      const opts = options || {};
      if(!state.apiUrl) state.apiUrl = HARDCODED_API_URL;
      if (!opts.skipOfflineGuard && !canReachServer()) {
        throw new Error('No internet connection.');
      }
      if (!opts.skipSessionRefresh && action !== 'login') {
        const ok = await ensureActiveSession_(false);
        if (!ok) throw new Error('Session expired. Please login again.');
      }
      const response = await fetch(state.apiUrl, {
        method:'POST',
        headers:{ 'Content-Type':'text/plain;charset=utf-8' },
        body: JSON.stringify({ action, token: state.token || '', data: data || {} })
      });
      const text = await response.text();
      let json;
      try { json = JSON.parse(text); } catch(e) { throw new Error(explainInvalidJsonResponse_(text, 'Could not reach the backend.')); }
      if(!json.ok) throw new Error(json.message || 'Request failed');
      if (json.backendVersion || json.version) state.backendVersion = json.backendVersion || json.version || state.backendVersion;
      if (json.syncHealth) state.syncHealth = json.syncHealth || {};
      return json;
    }

    function calculateTotals(userId){
      const items = state.transactions.filter(t => t.UserID === userId);
      let allocated=0, explicitCredits=0, spent=0, pending=0, notCompleted=0, balance=0;

      items.forEach(t => {
        const requested = Number(t.AmountRequested || 0);
        const finalUsed = Number(t.AmountFinal || 0);
        const paymentMethod = getPaymentMethod_(t);

        if (t.EntryType === 'credit' && t.Status === 'completed') {
          explicitCredits += Number(t.AmountFinal || t.AmountRequested || 0);
        }

        if (t.EntryType === 'debit' && (t.Status === 'approved_request' || t.Status === 'paid')) {
          allocated += requested;
          notCompleted += requested;
          balance += requested;
        }

        if (t.EntryType === 'debit' && t.Status === 'completed_paid') {
          spent += finalUsed;

          if (paymentMethod === 'CASH') {
            balance += (requested - finalUsed);
          } else if (paymentMethod === 'EFT' || paymentMethod === 'CARD') {
            balance += 0;
          }
        }

        if (t.EntryType === 'debit' && t.Status === 'pending') {
          pending += requested;
        }
      });

      return {
        allocated,
        explicitCredits,
        spent,
        pending,
        notCompleted,
        balance: explicitCredits + balance
      };
    }

    function formatNoticeDate(value){
      if(!value) return '';
      const dt = new Date(value);
      if(isNaN(dt.getTime())) return String(value);
      return new Intl.DateTimeFormat('en-ZA', {
        timeZone: SA_TIMEZONE,
        year:'numeric',
        month:'2-digit',
        day:'2-digit',
        hour:'2-digit',
        minute:'2-digit',
        hour12:false
      }).format(dt);
    }
    function getNoticeMeta_(tx){
      const stamp = tx.UpdatedAt || tx.CreatedAt || tx.RequestDate || tx.FinalDate || '';
      const formatted = formatNoticeDate(stamp);
      return formatted || '';
    }

    function adminNotificationEnabled_(kind){
      if (!isAdmin()) return true;
      const keyMap = {
        request: 'new_request',
        'admin-approved': 'approve_request',
        'admin-paid': 'mark_paid',
        'admin-completed': 'complete_expense',
        admin_payment_reminder: 'admin_payment_reminder',
        custom_message: 'custom_message'
      };
      const key = keyMap[kind] || kind || '';
      if (!key) return true;
      return String((state.adminNotificationPreferences || {})[key] || 'yes').toLowerCase() !== 'no';
    }

    function notificationSortTime_(notice){
      const raw = notice && (notice.sortAt || notice.updatedAt || notice.createdAt || notice.meta || '');
      const ms = raw ? new Date(raw).getTime() : 0;
      return isNaN(ms) ? 0 : ms;
    }

    function notificationGroupTitle_(kind){
      const map = {
        custom_message: 'Admin Messages',
        request: 'New Requests',
        'admin-approved': 'Approved Requests',
        'admin-paid': 'Marked Paid',
        'admin-completed': 'Completed Transactions',
        approved: 'Approved',
        paid: 'Paid'
      };
      return map[kind] || titleCase(String(kind || 'Notifications').replace(/[-_]/g, ' '));
    }

    function simpleHash_(text){
      let hash = 0;
      const raw = String(text || '');
      for (let i = 0; i < raw.length; i++) hash = ((hash << 5) - hash + raw.charCodeAt(i)) | 0;
      return Math.abs(hash).toString(36);
    }

    function customNotificationId_(title, body, sentAt){
      const stamp = String(sentAt || nowSAIso());
      return 'custom:' + stamp + ':' + simpleHash_(String(title || '') + '|' + String(body || ''));
    }

    function storeCustomNotification_(title, body, data){
      const cleanTitle = String(title || 'Petty cash message').trim() || 'Petty cash message';
      const cleanBody = String(body || '').trim();
      if (!cleanBody) return '';
      const details = data || {};
      const sentAt = String(details.sentAt || nowSAIso());
      const id = customNotificationId_(cleanTitle, cleanBody, sentAt);
      const existing = (state.customNotifications || []).find(function(n){ return n.id === id; });
      if (existing) return id;
      state.customNotifications = [
        {
          id: id,
          kind: 'custom_message',
          title: cleanTitle,
          body: cleanBody,
          sentAt: sentAt,
          sentByName: String(details.sentByName || 'Admin')
        }
      ].concat(state.customNotifications || []).slice(0, 50);
      saveLocal();
      return id;
    }

    function notificationIdFor(t, kind){
      return `${kind}:${t.TransactionID || ''}:${t.Status || ''}:${t.UpdatedAt || t.CreatedAt || ''}`;
    }

    function getTopNotifications(){
      const items = sortTransactionsNewestFirst(state.transactions);
      const notices = [];

      (state.customNotifications || []).forEach(function(n){
        if (isAdmin() && !adminNotificationEnabled_('custom_message')) return;
        notices.push({
          id: n.id,
          kind: 'custom_message',

          body: n.body || '',
          meta: formatNoticeDate(n.sentAt || ''),
          targetScreen: '',
          sortAt: n.sentAt || ''
        });
      });

      if (isAdmin()) {
        const currentAdminName = String((state.user && (state.user.username || state.user.Username || state.user.fullName || state.user.FullName)) || '').trim().toLowerCase();
        items.filter(t => t.EntryType === 'debit' && t.Status === 'pending').forEach(t => {
          if (!adminNotificationEnabled_('request')) return;
          notices.push({
            id: notificationIdFor(t, 'request'),

            transactionId: t.TransactionID,
            userId: t.UserID,

          });
        });

          if (!adminNotificationEnabled_('admin-approved')) return;
          const approvedBy = String(t.ApprovedBy || '').trim();
          if (!approvedBy) return;

          notices.push({
            id: notificationIdFor(t, 'admin-approved'),

          });
        });
        items.filter(t => t.EntryType === 'debit' && t.Status === 'paid').forEach(t => {
          if (!adminNotificationEnabled_('admin-paid')) return;
          const approvedBy = String(t.ApprovedBy || '').trim();

          notices.push({

          });

        items.filter(t => t.EntryType === 'debit' && t.Status === 'completed_paid').forEach(t => {
          if (!adminNotificationEnabled_('admin-completed')) return;
          notices.push({
            id: notificationIdFor(t, 'admin-completed'),
            kind: 'admin-completed',
            transactionId: t.TransactionID,
            userId: t.UserID,

            meta: getNoticeMeta_(t),
            targetScreen: 'transactions',
            sortAt: t.UpdatedAt || t.CreatedAt || t.FinalDate || t.RequestDate || ''
          });
        });
      } else if (state.user) {
        const userId = state.user.userId || state.user.UserID;
        items.filter(t => t.UserID === userId && t.EntryType === 'debit' && t.Status === 'approved_request').forEach(t => {
          notices.push({
            id: notificationIdFor(t, 'approved'),
            kind: 'approved',
            transactionId: t.TransactionID,
            userId: t.UserID,
            title: 'Approved',
            body: getPaymentMethod_(t) === 'CARD' ? `Your card request for ${money(t.AmountRequested)} was approved. You can now complete it.` : `Your request for ${money(t.AmountRequested)} under ${titleCase(t.Category || 'expense')} was approved. Waiting for admin payment confirmation.`,
            meta: getNoticeMeta_(t),
            targetScreen: 'my-entries',
            sortAt: t.UpdatedAt || t.CreatedAt || t.RequestDate || ''
          });
        });
        items.filter(t => t.UserID === userId && t.EntryType === 'debit' && t.Status === 'paid').forEach(t => {
          notices.push({
            id: notificationIdFor(t, 'paid'),
            kind: 'paid',
            transactionId: t.TransactionID,
            userId: t.UserID,
            title: 'Marked paid',
            body: `Your ${getPaymentMethod_(t)} request for ${money(t.AmountRequested)} is marked paid. You can now complete it.`,
            meta: getNoticeMeta_(t),
            targetScreen: 'my-entries',
            sortAt: t.UpdatedAt || t.CreatedAt || t.RequestDate || ''
          });
        });
      }

      const dismissed = new Set(state.dismissedNotifications || []);
      return notices
        .filter(n => !dismissed.has(n.id))
        .sort(function(a,b){ return notificationSortTime_(b) - notificationSortTime_(a); })
        .slice(0, 40);

    async function openTransactionFromPush_(transactionId, options){
      const txId = String(transactionId || '').trim();
      if (!txId) return;
      if (!state.user || !state.token) {
        storePendingNotificationOpen_(txId);
        return;
      }
      const opts = options || {};
      try {
        if (!opts.skipRefresh && canReachServer()) {
          await refreshFromBackend(true, { silent: true, skipQueueFlush: true, skipPendingNotificationOpen: true });
        }
      } catch (e) {}

      const tx = (state.transactions || []).find(function(item){ return String(item.TransactionID || '') === txId; });
      if (typeof dismissNotificationsForTransaction_ === 'function') dismissNotificationsForTransaction_(txId);
      if (tx && isAdmin()) state.selectedAdminUserId = tx.UserID || 'all';

      if (isAdmin()) {
        renderTransactions();
        showScreen('transactions');
      } else {
        renderMyEntries();
        showScreen('my-entries');
      }

      renderTopNotifications();
      setTimeout(function(){ blinkTransaction(txId); }, 220);
    }
    function applyPendingNotificationOpen_(options){
      const txId = consumePendingNotificationOpen_();
      if (!txId) return;
      openTransactionFromPush_(txId, options || { skipRefresh: true }).catch(function(){
        storePendingNotificationOpen_(txId);
      });
    }

    function isElementVisible_(el){
      if (!el) return false;
      if (!el.getClientRects || el.getClientRects().length === 0) return false;
      const style = window.getComputedStyle(el);
      if (!style || style.display === 'none' || style.visibility === 'hidden' || Number(style.opacity || 1) === 0) return false;
      let parent = el.parentElement;
      while (parent) {
        const parentStyle = window.getComputedStyle(parent);
        if (parentStyle.display === 'none' || parentStyle.visibility === 'hidden') return false;
        parent = parent.parentElement;
      }
      return true;
    }

    function findVisibleTransactionElement_(transactionId){
      const txId = String(transactionId || '').trim();
      if (!txId) return null;

      const allMatches = Array.from(document.querySelectorAll('[data-transaction-id]')).filter(function(el){
        return String(el.getAttribute('data-transaction-id') || '') === txId;
      });
      if (!allMatches.length) return null;

      const mobileMatch = allMatches.find(function(el){
        return isElementVisible_(el) && (el.classList.contains('recent-entry-card') || el.classList.contains('my-entry-card'));
      });
      if (mobileMatch) return mobileMatch;

      const visibleMatch = allMatches.find(isElementVisible_);
      return visibleMatch || allMatches[0];
    }

    function blinkTransaction(transactionId){
      state.pendingBlinkId = transactionId || '';
      const el = findVisibleTransactionElement_(transactionId);
      if (el) {
        el.classList.remove('blink-highlight');
        void el.offsetWidth;
        el.classList.add('blink-highlight');
        el.scrollIntoView({ behavior:'smooth', block:'center' });
        setTimeout(() => el.classList.remove('blink-highlight'), 3800);
      }
    }

    function dismissNotificationsForTransaction_(transactionId){
      const txId = String(transactionId || '').trim();
      if (!txId) return;
      const matchingIds = getTopNotifications()
        .filter(function(n){ return String(n.transactionId || '') === txId; })
        .map(function(n){ return n.id; });
      if (!matchingIds.length) return;
      state.dismissedNotifications = Array.from(new Set([...(state.dismissedNotifications || []), ...matchingIds]));
      saveLocal();
    }

    function giveNotificationPressFeedback_(item){
      if (!item) return;
      item.classList.add('notice-opening');
      item.setAttribute('aria-busy', 'true');
      try { if (navigator.vibrate) navigator.vibrate(25); } catch (e) {}
    }

    function nextPaint_(){
      return new Promise(function(resolve){
        requestAnimationFrame(function(){ requestAnimationFrame(resolve); });
      });
    }

    async function openNotification(notificationId){
      const notice = getTopNotifications().find(n => n.id === notificationId);
      if (!notice) return;

      state.notificationsOpen = false;
      state.pendingBlinkId = notice.transactionId || '';
      const panel = document.getElementById('noticePanel');
      if (panel) panel.classList.add('hidden');

      if (notice.kind === 'custom_message') {
        state.dismissedNotifications = Array.from(new Set([...(state.dismissedNotifications || []), notice.id]));
        saveLocal();
        renderTopNotifications();
        return;
      }

      if (notice.transactionId) {
        try {
          await openTransactionFromPush_(notice.transactionId, { skipRefresh: true });
          return;
        } catch (e) {
          console.warn('Could not open transaction from notification', e);
        }
      }

      state.dismissedNotifications = Array.from(new Set([...(state.dismissedNotifications || []), notice.id]));
      saveLocal();
      renderTopNotifications();
    }

    function renderTopNotifications(){
      const panel = document.getElementById('noticePanel');
      const badge = document.getElementById('noticeBadge');
      if (!panel || !badge) return;

      const notices = getTopNotifications();
      badge.textContent = String(notices.length);
      badge.classList.toggle('hidden', notices.length === 0);

      if (!notices.length) {
        panel.innerHTML = `<div class="notice-panel-head"><div class="notice-panel-title">Notifications</div><button class="notice-clear-btn" id="noticeClearAllBtn" type="button">Clear all</button></div><div class="notice-empty">No new notifications.</div>`;
      } else {
        const groups = [];
        notices.forEach(function(n){
          let group = groups.find(function(g){ return g.kind === n.kind; });
          if (!group) {
            group = { kind: n.kind, title: notificationGroupTitle_(n.kind), items: [] };
            groups.push(group);
          }
          group.items.push(n);
        });
        const groupedHtml = groups.map(function(group){
          return `<div class="notice-group-title">${escapeHtml(group.title)} (${group.items.length})</div>` + group.items.map(function(n){
            return `<div class="notice-item" data-notification-id="${escapeHtml(n.id)}">
              <div class="notice-title">${escapeHtml(n.title)}</div>
              <div>${escapeHtml(n.body)}</div>
              <div class="notice-meta">${escapeHtml(n.meta || '')}</div>
            </div>`;
          }).join('');
        }).join('');
        panel.innerHTML = `<div class="notice-panel-head"><div class="notice-panel-title">Notifications</div><button class="notice-clear-btn" id="noticeClearAllBtn" type="button">Clear all</button></div>${groupedHtml}`;
      }

      const clearBtn = document.getElementById('noticeClearAllBtn');
      if (clearBtn) clearBtn.onclick = function(ev){ ev.stopPropagation(); clearAllNotifications(); };

      panel.querySelectorAll('.notice-item').forEach(item => {
        item.onclick = async function(ev){
          ev.stopPropagation();
          giveNotificationPressFeedback_(item);
          await nextPaint_();
          openNotification(item.getAttribute('data-notification-id'));

      });

      maybeShowBrowserNotifications(false);

    function formatSADateDisplay(value){
      if(!value) return '';
      if (/^\d{4}-\d{2}-\d{2}$/.test(String(value))) {
        const [y,m,d] = String(value).split('-').map(Number);
        const dt = new Date(Date.UTC(y, m - 1, d));
        return new Intl.DateTimeFormat('en-GB', { timeZone: SA_TIMEZONE, day:'numeric', month:'long', year:'numeric' }).format(dt);
      }
      const dt = new Date(value);
      if(isNaN(dt.getTime())) return String(value);
      return new Intl.DateTimeFormat('en-GB', { timeZone: SA_TIMEZONE, day:'numeric', month:'long', year:'numeric' }).format(dt);
    }

    function isCompletedForDate_(tx){
      const status = String(tx && tx.Status || '').trim();
      return status === 'completed_paid' || status === 'completed';
    }
    function getTransactionFlowDate_(tx){
      if (!tx) return '';
      const finalDate = formatSADateOnly(tx.FinalDate || '');
      const requestDate = formatSADateOnly(tx.RequestDate || '');
      return (isCompletedForDate_(tx) && finalDate) ? finalDate : requestDate;
    }
    function getTransactionFlowDateLabel_(tx){
      return isCompletedForDate_(tx) ? 'Final date' : 'Requested date';
    }
    function getTransactionCreatedAtText_(tx){
      return formatSADateTimeValue_((tx && tx.CreatedAt) || '');
    }
    function getTransactionSortMs_(tx){
      const flowDate = getTransactionFlowDate_(tx);
      const ms = flowDate ? new Date(flowDate + 'T00:00:00+02:00').getTime() : NaN;
      return isNaN(ms) ? 0 : ms;
    }
    function getTransactionCreatedSortMs_(tx){
      const created = getTransactionCreatedAtText_(tx);
      const updated = formatSADateTimeValue_((tx && tx.UpdatedAt) || '');
      const candidates = [created, updated].filter(Boolean);
      for (let i = 0; i < candidates.length; i++) {
        const ms = new Date(candidates[i].replace(' ', 'T') + '+02:00').getTime();
        if (!isNaN(ms)) return ms;
      }
      return 0;
    }
    function renderTransactionDateCell_(tx, className){
      const flowDate = getTransactionFlowDate_(tx);
      const flowText = formatSADateOnly(flowDate || '');
      const createdText = getTransactionCreatedAtText_(tx);
      const label = getTransactionFlowDateLabel_(tx);
      const cls = className || 'small muted';
      return '<div>' + escapeHtml(flowText || '-') + '</div>' +
        '<div class="' + cls + '">' + escapeHtml(label) + '</div>' +
        (createdText ? '<div class="' + cls + '">Created: ' + escapeHtml(createdText) + '</div>' : '');
    }
    function renderTransactionDateLine_(tx, className){
      const flowDate = getTransactionFlowDate_(tx);
      const dateText = formatSADateDisplay(flowDate || '');
      const createdText = getTransactionCreatedAtText_(tx);
      const label = getTransactionFlowDateLabel_(tx);
      const cls = className || 'small muted';
      return '<div>' + escapeHtml(dateText || '-') + '</div>' +
        '<div class="' + cls + '">' + escapeHtml(label) + '</div>' +
        (createdText ? '<div class="' + cls + '">Created: ' + escapeHtml(createdText) + '</div>' : '');
    }

      document.querySelectorAll(`[data-id="${id}"]`).forEach(btn => {

          btn.dataset.prevText = btn.textContent;

          delete btn.dataset.prevText;

    async function saveRequest(){
      const saveBtn = document.getElementById('saveRequestBtn');
      try{
        captureRequestDraft_();
        if (saveBtn){ saveBtn.disabled = true; saveBtn.textContent = 'Saving...'; }
        const userId = isAdmin() ? document.getElementById('requestUserId').value : (state.user.userId || state.user.UserID);
        const requestDate = document.getElementById('requestDate').value;
        const amountRequested = Number(document.getElementById('requestAmount').value || 0);
        const category = document.getElementById('requestCategory').value;
        const equipmentPlantNo = (document.getElementById('requestEquipmentPlantNo') || {}).value || '';
        const supplier = document.getElementById('requestSupplier').value.trim();
        const paymentType = normalizePaymentMethod_(document.getElementById('requestPaymentType').value || 'CASH');
        const referenceNumber = document.getElementById('requestReference').value.trim();
        const remark = document.getElementById('requestRemark').value.trim();
        const requestAttachments = normalizeAttachmentList_(state.pendingRequestFiles || state.pendingRequestFile || []);
        const userObj = state.users.find(u => (u.UserID || u.userId) === userId) || state.user;
        if(!requestDate) throw new Error('Date is required.');
        validateDateAgainstSettings(requestDate);
        if(!(amountRequested > 0)) throw new Error('Requested amount must be greater than zero.');
        if(!remark) throw new Error('Remark is required.');
        if(isEquipmentCategory_(category) && !equipmentPlantNo) {
          const plantEl = document.getElementById('requestEquipmentPlantNo');
          const wrap = document.getElementById('requestEquipmentPlantWrap');
          if (wrap) wrap.classList.remove('hidden');
          if (plantEl) {
            plantEl.required = true;
            try { plantEl.focus(); } catch(e) {}
            plantEl.style.borderColor = '#dc2626';
            setTimeout(function(){ plantEl.style.borderColor = ''; }, 2500);
          }
          throw new Error('Machine / Plant No. is required when Category is Parts or Oil.');
        }
        const entry = {
          transactionId: generateLocalId('TRX'),
          userId,
          userName:userObj.FullName || userObj.fullName,
          requestDate,
          finalDate:'',
          requestTime:currentSATime(),
          entryType:'debit',
          amountRequested,
          amountFinal:'',
          category,
          equipmentPlantNo,
          supplier,
          remark,
          paymentMethod: paymentType,
          referenceNumber,
          files: requestAttachments.map(function(file){ return { fileName: file.name, fileMimeType: file.mimeType, fileDataBase64: file.base64 }; }),
          fileName: joinAttachmentField_(requestAttachments, 'name'),
          fileRef:'',
          fileLink:'',
          fileMimeType: '',
          fileDataBase64: '',
          uploadDay: requestDate,
          uploadMonth: String(requestDate || '').slice(0, 7),
          uploadUserName: userObj.FullName || userObj.fullName || '',
          uploadType: 'request',
          status:isAdmin() ? 'approved_request' : 'pending',
          createdBy:state.user.username || state.user.Username || '',
          createdAt:nowSAIso(),
          approvedBy:isAdmin() ? (state.user.username || state.user.Username || '') : '',
          isBackdated:requestDate < todayISO()
        };
        applyLocalRequestTransaction(entry);
        saveLocal();
        renderDashboard();
        renderMyEntries();
        setBanner('Saved instantly. Uploading in background...','ok');

        try {
          apiCall('syncEntries', { entries: [entry] })
            .then(async (result) => {
              // The backend creates the final Google Sheet TransactionID (PC-yyyymmdd-####).
              // Replace the temporary local TRX/LOCALTRX id immediately so later
              // approve / mark-paid actions update the same transaction instead of
              // leaving the local pending card behind.
              applySyncedTransactionIdMappings_(result);
              markLocalTransactionsSynced_((result && result.synced) || []);
              dedupeTransactionsInState_();
              saveLocal();
              await refreshTransactionsOnly();
              setBanner('Expense request synced successfully.','ok');
              updateSyncState();
            })
            .catch(() => {
              enqueueOperation('syncEntries', { entries: [entry] }, { type: 'request' });
              setBanner('No signal. Request queued for next sync.','ok');
              updateSyncState();
            });
        } catch(err){
          enqueueOperation('syncEntries', { entries: [entry] }, { type: 'request' });
          setBanner('No signal. Request queued for next sync.','ok');
        }
        clearRequestForm();
        renderDashboard();
        renderMyEntries();
        renderAddRequest();
        if (isAdmin()) renderTransactions();
        showScreen('add-request');
        alert('Entry saved.');
      } catch(err){
        setBanner(err.message,'error');
      } finally {
        if (saveBtn){ saveBtn.disabled = false; saveBtn.textContent = 'Save Request'; }
        saveLocal();
        updateSyncState();
      }
    }

      if(searchEl) searchEl.addEventListener('input',renderFiltered);
      if(clearBtn) clearBtn.addEventListener('click',function(){
        statusEl.value='all'; typeEl.value='all'; paymentEl.value='all'; fromEl.value=''; toEl.value=''; searchEl.value='';

    function excelSafe_(value){
      const raw = String(value == null ? '' : value);
      return raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function plainStatusLabel_(status){
      const value = String(status || '').trim();
      if (value === 'approved_request') return 'Approved Request';
      if (value === 'completed_paid') return 'Completed Paid';
      if (value === 'completed') return 'Completed / Admin Load';
      if (value === 'paid') return 'Paid / Proof Verified';
      return titleCase(value || '');
    }
    function isNotCompletedTransaction_(t){
      const status = String(t && t.Status || '').trim();
      const type = String(t && t.EntryType || '').trim();
      return type === 'debit' && ['pending','approved_request','paid'].includes(status);
    }

    function getOwnTransactions_(){
      const userId = String((state.user && (state.user.userId || state.user.UserID)) || '');
      return sortTransactionsNewestFirst((state.transactions || []).filter(function(t){
        return String(t.UserID || '') === userId;
      }));
    }
    function getUserFilteredTransactions_(){
      let items = getOwnTransactions_();
      const statusEl = document.getElementById('myTransactionStatusFilter');
      const typeEl = document.getElementById('myTransactionTypeFilter');
      const paymentEl = document.getElementById('myTransactionPaymentFilter');
      const fromEl = document.getElementById('myTransactionDateFrom');
      const toEl = document.getElementById('myTransactionDateTo');
      const searchEl = document.getElementById('myTransactionSearchFilter');
      const status = statusEl ? statusEl.value : 'all';
      const type = typeEl ? typeEl.value : 'all';
      const payment = paymentEl ? paymentEl.value : 'all';
      const dateFrom = fromEl ? String(fromEl.value || '') : '';
      const dateTo = toEl ? String(toEl.value || '') : '';
      const search = searchEl ? String(searchEl.value || '').trim().toLowerCase() : '';
      if(status==='backdated') items=items.filter(t=>String(t.IsBackdated || '').toLowerCase()==='yes');
      else if(status==='not_completed') items=items.filter(isNotCompletedTransaction_);
      else if(status!=='all') items=items.filter(t=>String(t.Status || '')===status);
      if(type!=='all') items=items.filter(t=>String(t.EntryType || '')===type);
      if(payment!=='all') items=items.filter(t=>getPaymentMethod_(t)===payment);
      if(dateFrom) items=items.filter(t=>String(getTransactionFlowDate_(t) || '') >= dateFrom);
      if(dateTo) items=items.filter(t=>String(getTransactionFlowDate_(t) || '') <= dateTo);
      if(search){
        items=items.filter(t=>[
          t.TransactionID, t.Category, t.Supplier, t.Remark, t.PaymentMethod,
          t.ReferenceNumber, t.Status, t.EntryType, t.ApprovedBy, t.FileName
        ].some(v=>String(v || '').toLowerCase().includes(search)));
      }
      return items;
    }

    function exportAdminTransactionsToExcel_(items){
      if(!isAdmin()) return;
      const exportItems = (items && items.length ? items : getAdminFilteredTransactions_());
      const rows = exportItems.map(t => ({
        'Transaction ID': t.TransactionID || '',
        'User ID': t.UserID || '',
        'User Name': t.UserName || '',
        'Request Date': formatSADateOnly(t.RequestDate || ''),
        'Final Date': formatSADateOnly(t.FinalDate || ''),
        'Request Time (SA)': normalizeTimeValue(t.RequestTime || ''),
        'Type': titleCase(t.EntryType || ''),
        'Payment Method': getPaymentMethod_(t),
        'Flow Status': plainStatusLabel_(t.Status || ''),
        'Amount Requested': Number(t.AmountRequested || 0),
        'Amount Final': t.AmountFinal===''||t.AmountFinal==null?'':Number(t.AmountFinal || 0),
        'Category': titleCase(t.Category || ''),
        'Supplier': t.Supplier || '',
        'Reference Number': getDisplayReferenceNumber_(t) || '',
        'Remark': t.Remark || '',
        'Approved By': t.ApprovedBy || '',
        'Created At (SA)': formatSADateTimeValue_(t.CreatedAt || ''),
        'Updated At (SA)': formatSADateTimeValue_(t.UpdatedAt || ''),
        'Slip File': t.FileName || '',
        'Slip Link': t.FileLink || '',
        'Backdated': String(t.IsBackdated || '').toLowerCase()==='yes' ? 'Yes' : 'No'
      }));
      if(!rows.length){ setBanner('No transactions to export.', 'error'); return; }

      const totalRequested = rows.reduce((sum, r)=>sum + Number(r['Amount Requested'] || 0), 0);
      const totalFinal = rows.reduce((sum, r)=>sum + Number(r['Amount Final'] || 0), 0);
      const headers = Object.keys(rows[0]);
      const generated = formatSADateTimeValue_(nowSAIso());
      const filterSummary = [
        'Status: ' + ((document.getElementById('transactionStatusFilter') || {}).value || 'all'),
        'User: ' + ((document.getElementById('transactionUserFilter') || {}).value || 'all'),
        'Type: ' + ((document.getElementById('transactionTypeFilter') || {}).value || 'all'),
        'Payment: ' + ((document.getElementById('transactionPaymentFilter') || {}).value || 'all')
      ].join(' | ');

      const colGroup = headers.map(h => {
        const wide = /Remark|Slip Link|Slip File|Supplier|User Name/i.test(h) ? 180 : (/Transaction ID|Created|Updated|Reference/i.test(h) ? 140 : 95);
        return '<col style="width:' + wide + 'px">';
      }).join('');

      const bodyRows = rows.map(r => '<tr>' + headers.map(h => {
        if (/Amount/.test(h)) return excelCell_(r[h], 'money');
        if (/Date|Time|Created|Updated/.test(h)) return excelCell_(r[h], 'date');
        if (/Slip Link/.test(h) && r[h]) return '<td class="link"><a href="' + excelSafe_(r[h]) + '">' + excelSafe_(r[h]) + '</a></td>';
        return excelCell_(r[h], 'text');
      }).join('') + '</tr>').join('');

      const html = `<!doctype html><html><head><meta charset="utf-8"><style>
        body{font-family:Arial,Helvetica,sans-serif;color:#111827;}
        table{border-collapse:collapse;width:100%;}
        .title{font-size:20px;font-weight:700;background:#14532d;color:white;text-align:left;}
        .sub{font-size:12px;background:#eef6ee;color:#1f2937;text-align:left;}
        th{background:#166534;color:white;font-weight:700;border:1px solid #d1d5db;padding:8px;text-align:left;white-space:nowrap;}
        td{border:1px solid #d1d5db;padding:6px;vertical-align:top;font-size:12px;}
        .money{mso-number-format:'R #,##0.00';text-align:right;}
        .date{mso-number-format:'@';white-space:nowrap;}
        .text{mso-number-format:'@';}
        .link{mso-number-format:'@';color:#1155cc;}
        .summary-label{font-weight:700;background:#f3f4f6;}
        .summary-value{font-weight:700;text-align:right;mso-number-format:'R #,##0.00';}
      </style></head><body>
      <table>
        <colgroup>${colGroup}</colgroup>
        <tr><td class="title" colspan="${headers.length}">EarthLabs Petty Cash - Admin Export</td></tr>
        <tr><td class="sub" colspan="${headers.length}">Generated: ${excelSafe_(generated)} SA time | Records: ${rows.length} | ${excelSafe_(filterSummary)}</td></tr>
        <tr><td class="summary-label" colspan="2">Total Requested</td><td class="summary-value">${totalRequested.toFixed(2)}</td><td class="summary-label" colspan="2">Total Final</td><td class="summary-value">${totalFinal.toFixed(2)}</td><td colspan="${Math.max(headers.length-6,1)}"></td></tr>
        <tr>${headers.map(h=>'<th>'+excelSafe_(h)+'</th>').join('')}</tr>
        ${bodyRows}
      </table></body></html>`;
      const blob = new Blob(['\ufeff', html], { type: 'application/vnd.ms-excel;charset=utf-8;' });
      const a = document.createElement('a');
      const stamp = new Intl.DateTimeFormat('en-ZA', { timeZone: SA_TIMEZONE, year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false }).format(new Date()).replace(/[\/:,\s]+/g,'-');
      a.href = URL.createObjectURL(blob);
      a.download = 'petty-cash-admin-export-SA-' + stamp + '.xls';
      document.body.appendChild(a);
      a.click();
      setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 1000);
      setBanner('Exported ' + rows.length + ' transaction(s) to Excel.', 'ok');
    }

    function renderTransactions(){
      const el=document.getElementById('screen-transactions');
      if(!isAdmin()){ el.innerHTML=''; return; }
      const userOptions=['<option value="all">All Users</option>'].concat(

><label class="check-row"><input type="checkbox" id="notifyPaymentReminder" ${checked('admin_payment_reminder')} /> Admin payment reminders</label><label class="check-row"><input type="checkbox" id="notifyCustomMessages" ${checked('custom_message')} /> Custom admin messages</label></div><div class="actions"><button id="saveSettingsBtn" type="button">Save Settings</button></div></div>`;

    async function saveSettings(){
      const btn = document.getElementById('saveSettingsBtn');
      const yesNo = function(id){ const el = document.getElementById(id); return !el || el.checked ? 'yes' : 'no'; };
      try {
        if (btn) {
          btn.disabled = true;
          btn.textContent = 'Saving...';
        }
        state.apiUrl = document.getElementById('settingsApiUrl').value.trim();
        if(!state.apiUrl) state.apiUrl = HARDCODED_API_URL;
        saveLocal();
        const result = await apiCall('saveSettings', {
          allowBackdate: document.getElementById('backdateSelect').value,
          maxBackdateDays: document.getElementById('maxBackdateDays').value,
          currency: document.getElementById('currencySelect').value
        });
        const nextPrefs = {
          new_request: yesNo('notifyNewRequest'),
          approve_request: yesNo('notifyApproved'),
          mark_paid: yesNo('notifyPaid'),
          complete_expense: yesNo('notifyCompleted'),
          admin_payment_reminder: yesNo('notifyPaymentReminder'),
          custom_message: yesNo('notifyCustomMessages')
        };
        let prefResult = null;
        try {
          prefResult = await apiCall('saveNotificationPreferences', { preferences: nextPrefs });
        } catch (prefErr) {
          state.adminNotificationPreferences = nextPrefs;
          saveLocal();
          setBanner('Settings saved. Notification preferences saved on this device but could not update Sheets yet: ' + (prefErr.message || prefErr), 'error');
        }
        state.settings = result.settings || state.settings;
        state.adminNotificationPreferences = (prefResult && prefResult.notificationPreferences) || state.adminNotificationPreferences || nextPrefs;
        saveLocal();
        renderDashboard();

        renderTopNotifications();
        if (typeof renderLoadMoney === 'function') renderLoadMoney();
        renderSettings();
        showScreen('settings');

      } catch(err) {

      } finally {
        const saveBtn = document.getElementById('saveSettingsBtn');
        if (saveBtn) {
          saveBtn.disabled = false;
          saveBtn.textContent = 'Save Settings';
        }

    function renderStatusPill(t){

      const item=map[t.Status];

    function needsAdminPaidStep(t){
      const paymentMethod = getPaymentMethod_(t);
      return t && t.EntryType==='debit' && t.Status==='approved_request' && (paymentMethod==='CASH' || paymentMethod==='EFT');
    }
    function canUserCompleteTransaction(t){
      if (!t || t.EntryType!=='debit') return false;
      const paymentMethod = getPaymentMethod_(t);
      if (paymentMethod==='CARD') return t.Status==='approved_request';
      return t.Status==='paid';
    }
    function paymentPendingKeyFor(id){ return `PAY:${id}`; }
    function canDeleteTransactionLocal_(t){
      if(!t) return false;
      if(isAdmin()) return true;
      if(t.EntryType !== 'debit') return false;
      const status = String(t.Status || '').trim();
      if(status !== 'pending' && status !== 'rejected') return false;
      return String(t.UserID || '') === String((state.user && (state.user.userId || state.user.UserID)) || '');
    }
    function isQueuedLocalTransaction_(id){
      return (state.pendingOps || []).some(function(op){
        if(!op || op.action !== 'syncEntries') return false;
        const entries = op.data && Array.isArray(op.data.entries) ? op.data.entries : [];
        return entries.some(function(entry){ return String(entry.transactionId || '') === String(id || ''); });
      });
    }
    function removeQueuedTransactionItems_(id){
      const txId = String(id || '');
      let removed = 0;
      state.pendingOps = (state.pendingOps || []).filter(function(op){
        if(!op) return false;
        if(op.action === 'syncEntries') {
          const entries = op.data && Array.isArray(op.data.entries) ? op.data.entries : [];
          if(entries.some(function(entry){ return String(entry.transactionId || '') === txId; })) { removed++; return false; }
        }
        if(op.data && String(op.data.transactionId || '') === txId) { removed++; return false; }
        return true;
      });
      delete state.pendingFiles[txId];
      delete state.pendingPaymentFiles[paymentPendingKeyFor(txId)];
      return removed;
    }

    function renderAdminActionCell(t){
      if(!isAdmin()) return '-';
      const editBtn = `<button type="button" class="secondary admin-edit-transaction-btn" data-id="${escapeHtml(t.TransactionID || '')}">Edit</button>`;
      const deleteBtn = `<button type="button" class="danger-btn delete-transaction-btn" data-id="${escapeHtml(t.TransactionID || '')}">Delete</button>`;
      if(t.EntryType==='debit' && t.Status==='pending') return `<div class="actions">${editBtn}<button type="button" class="success-btn approve-request-btn" data-id="${escapeHtml(t.TransactionID || '')}">Approve Request</button><button type="button" class="danger-btn reject-btn" data-id="${escapeHtml(t.TransactionID || '')}">Reject</button>${deleteBtn}</div>`;
      if(needsAdminPaidStep(t)){
        const paymentMethod = getPaymentMethod_(t);
        const pending = normalizeAttachmentList_(state.pendingPaymentFiles[paymentPendingKeyFor(t.TransactionID)]);
        if(paymentMethod==='EFT'){
          if(!pending.length){
            return `<div class="stack"><div class="actions">${editBtn}${deleteBtn}</div><div class="small muted">Approved. Upload proof and mark paid.</div><button type="button" class="secondary upload-payment-proof-btn" data-id="${escapeHtml(t.TransactionID || '')}">Upload Proof</button></div>`;
          }
          return `<div class="stack"><div class="actions">${editBtn}${deleteBtn}</div><div class="small muted">Proof attached (${pending.length}): ${escapeHtml(attachmentNamesText_(pending))}</div><div class="actions"><button type="button" class="secondary upload-payment-proof-btn" data-id="${escapeHtml(t.TransactionID || '')}">Add More</button><button type="button" class="danger-btn remove-payment-proof-btn" data-id="${escapeHtml(t.TransactionID || '')}">Remove</button></div><button type="button" class="success-btn mark-paid-btn" data-id="${escapeHtml(t.TransactionID || '')}">Verify & Mark Paid</button></div>`;
        }
        return `<div class="stack"><div class="actions">${editBtn}${deleteBtn}</div><div class="small muted">Approved. Confirm cash was paid to user.</div><button type="button" class="success-btn mark-paid-btn" data-id="${escapeHtml(t.TransactionID || '')}">Mark Cash Paid</button></div>`;
      }
      return `<div class="actions">${editBtn}${deleteBtn}</div>`;
    }
    function renderCompleteCell(t){
      if(!t || t.EntryType!=='debit') return '-';
      if(!isAdmin() && t.UserID !== (state.user.userId || state.user.UserID)) return '-';

      const paymentMethod = getPaymentMethod_(t);
      const canCompleteNow = canUserCompleteTransaction(t);
      const canAttachNow = t.Status === 'approved_request' || t.Status === 'paid';
      if(!canAttachNow) {
        if(canDeleteTransactionLocal_(t)) return `<button type="button" class="danger-btn delete-transaction-btn" data-id="${t.TransactionID}">Delete Request</button>`;
        return '-';
      }

      const pending = normalizeAttachmentList_(state.pendingFiles[t.TransactionID]);
      const waitingPaidStep = !canCompleteNow && t.Status === 'approved_request' && (paymentMethod === 'CASH' || paymentMethod === 'EFT');
      const waitingText = waitingPaidStep
        ? 'Slip can be attached now. Completion unlocks after admin marks the cash/EFT as paid.'
        : 'Attach one or more files before completing.';

      if(!pending.length){
        return `<div class="stack"><button type="button" class="secondary upload-slip-btn" data-id="${t.TransactionID}">Attach Slip(s)</button><div class="small muted">${waitingText}</div></div>`;

      if(!canCompleteNow){
        return `<div class="stack">${fileControls}<div class="small muted">Waiting for admin to mark ${escapeHtml(paymentMethod)} as paid before final completion.</div></div>`;
      }
      return `<div class="stack">${fileControls}<button type="button" class="complete-btn" data-id="${t.TransactionID}">Complete Transaction</button></div>`;
    }

      if(!tx) { setBanner('Transaction not found on this device.', 'error'); return; }
      if(!canDeleteTransactionLocal_(tx)) { setBanner('You do not have permission to delete this transaction.', 'error'); return; }
      const reason = isAdmin() ? (window.prompt('Reason for deleting this transaction:', 'Admin correction') || '') : '';
      if(!window.confirm(isAdmin() ? 'Admin delete this transaction from Google Sheets? It will be moved to DeletedTransactions and removed from all devices.' : 'Delete this unsynced/pending request?')) return;
      setActionButtonsDisabled(id, true);
      try{
        const queuedLocal = isQueuedLocalTransaction_(id);
        if(queuedLocal && !canReachServer()){
          removeQueuedTransactionItems_(id);
          state.transactions = state.transactions.filter(t => String(t.TransactionID || '') !== String(id || ''));
          saveLocal();
          renderDashboard(); renderTransactions(); renderMyEntries(); renderTopNotifications(); showScreen(isAdmin() ? 'transactions' : 'my-entries');
          setBanner('Unsynced request deleted from this device and removed from the upload queue.', 'ok');
          updateSyncState();
          return;
        }
        if(!canReachServer()) throw new Error('No internet. Synced transactions can only be deleted when online so Google Sheets stays the master.');
        const result = await apiCall('deleteTransaction', { transactionId:id, reason: reason });
        removeQueuedTransactionItems_(id);
        state.transactions = state.transactions.filter(t => String(t.TransactionID || '') !== String(id || ''));
        state.lastSyncAt = result.serverTime || nowSAIso();
        saveLocal();
        setBanner('Transaction deleted. It was moved to DeletedTransactions and will be removed from all devices.', 'ok');
        try { await refreshFromBackend(false, { silent: true, skipQueueFlush: true }); } catch(refreshErr) {}
        renderDashboard(); renderTransactions(); renderMyEntries(); renderTopNotifications(); showScreen(isAdmin() ? 'transactions' : 'my-entries');
      }catch(err){
        setActionButtonsDisabled(id, false);
        setBanner(err.message || String(err), 'error');
      } finally {
        saveLocal();
        updateSyncState();
      }
    }

    async function pickAttachmentFiles_(){
      return await new Promise((resolve, reject) => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.jpg,.jpeg,.png,.pdf,.webp,image/*,application/pdf';
        input.multiple = true;
        input.style.display = 'none';
        document.body.appendChild(input);
        input.addEventListener('change', async () => {
          const files = Array.from(input.files || []);
          document.body.removeChild(input);
          if (!files.length) { resolve([]); return; }
          try {
            const mapped = await Promise.all(files.map(function(file){
              return new Promise(function(resolveFile, rejectFile){
                const reader = new FileReader();
                reader.onload = function(){
                  const result = String(reader.result || '');
                  const base64 = result.includes(',') ? result.split(',')[1] : result;
                  resolveFile({
                    name: file.name || 'attachment',
                    mimeType: file.type || 'application/octet-stream',
                    base64
                  });
                };
                reader.onerror = function(){ rejectFile(new Error('Could not read one of the selected files.')); };
                reader.readAsDataURL(file);
              });
            }));
            resolve(mapped);
          } catch (err) {
            reject(err);
          }
        }, { once:true });
        input.click();
      });
    }

    async function getChangesSince(){

      });
      const changed = result.transactions || [];
      const deletedIds = result.deletedTransactionIds || [];
      if (deletedIds.length) {
        const deletedSet = new Set(deletedIds.map(function(id){ return String(id || ''); }));
        state.transactions = (state.transactions || []).filter(function(t){ return !deletedSet.has(String(t.TransactionID || '')); });
        deletedIds.forEach(removeQueuedTransactionItems_);
      }
      if (changed.length) changed.forEach(updateTransactionInState);
      dedupeTransactionsInState_();
      state.lastSyncAt = result.serverTime || nowSAIso();

    async function refreshFromBackend(full, options){
      const opts = options || {};
      if(!state.token) return;
      if (!canReachServer()) {
        updateSyncState();
        if (!opts.silent) renderApp();
        return;
      }
      try {
        if (!opts.skipQueueFlush) await flushPendingOperations({ silent: true });
        state.isSyncing = true;
        updateSyncState('Syncing...', 'info');
        if (full) {
          const data = await apiCall('bootstrap', {}, { skipOfflineGuard: true });
          state.settings = data.settings || state.settings;
          state.adminNotificationPreferences = data.notificationPreferences || state.adminNotificationPreferences;
          state.categories = data.categories || state.categories;
          state.users = data.users || [];
          if (data.plantsUpdatedAt && data.plantsUpdatedAt !== state.plantsUpdatedAt) {
            state.plants = data.plants || [];
            state.plantsUpdatedAt = data.plantsUpdatedAt || '';
          } else if (!state.plants.length && data.plants) {
            state.plants = data.plants || [];
            state.plantsUpdatedAt = data.plantsUpdatedAt || state.plantsUpdatedAt || '';
          }
          state.transactions = mergeBackendTransactions_(data.transactions || []);
          dedupeTransactionsInState_();
          state.lastSyncAt = data.serverTime || nowSAIso();
          state.lastSyncRevision = Number(data.syncRevision || state.lastSyncRevision || 0);
          if (data.syncHealth) state.syncHealth = data.syncHealth || {};
          if (data.backendVersion || data.version) state.backendVersion = data.backendVersion || data.version;
          saveLocal();
        } else {
          await getChangesSince();
        }
      } finally {
        state.isSyncing = false;
        updateSyncState();
      }
      if (!document.getElementById('appView').classList.contains('hidden')) {
        if (shouldAvoidHeavyRender_() || !full) renderVisibleScreen_({ screen: getCurrentScreenName_() });
        else renderApp({ keepScreen: true, preserveScroll: true });
      } else {
        renderApp();
      }
      if (!opts.skipPendingNotificationOpen) setTimeout(function(){ applyPendingNotificationOpen_({ skipRefresh: true }); }, 250);
    }
