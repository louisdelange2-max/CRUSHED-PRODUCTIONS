<script>(function(){'use strict';
var HARD_CODED_SCRIPT_URL='https://script.google.com/macros/s/AKfycbxgexeD1Z1kKhBL3bjJkb8w3bwErxnGmCRAzsygY4eii-8_bwbI2OZooXXx-otktA91RA/exec';

var state={tab:'add',sites:[],customers:[],materials:[],sections:[],entries:[],queue:[],lastForm:{site:'',customer:'',material:'',unit:'Tons',section:''},draft:{slips:[blankSlip()]}};
function $(id){return document.getElementById(id)}function esc(s){return String(s==null?'':s).replace(/[&<>\"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]||c})}function nowSA(){return new Intl.DateTimeFormat('sv-SE',{timeZone:'Africa/Johannesburg',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).format(new Date()).replace(' ','T')}function todaySA(){return nowSA().slice(0,10)}function uid(){return 'PROD-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,7).toUpperCase()}function blankSlip(){return {slipNo:'',qty:'',photoData:'',photoUrl:'',ocrText:'',ocrStatus:''}}
function makeStorageState(){var s=JSON.parse(JSON.stringify(state||{}));(s.entries||[]).forEach(function(e){(e.slips||[]).forEach(function(sl){sl.photoData=''});});return s}
function save(){try{localStorage.setItem('hfqSlipProductionStateV1',JSON.stringify(makeStorageState()))}catch(e){try{var s=makeStorageState();(s.queue||[]).forEach(function(q){(q.payload.slips||[]).forEach(function(sl){if(sl.photoData){sl.photoData='[PHOTO_TOO_LARGE_RETAKE_BEFORE_SYNC]';sl.photoNeedsRetake=true}})});localStorage.setItem('hfqSlipProductionStateV1',JSON.stringify(s));msg('Phone storage was full. Large slip photos were removed from local storage. Retake photos before syncing if needed.','error')}catch(err){msg('Phone storage full. Could not save local cache.','error')}}}
function load(){try{var old=JSON.parse(localStorage.getItem('hfqSlipProductionStateV1')||'{}');Object.assign(state,old);if(!state.draft)state.draft={slips:[blankSlip()]};if(!Array.isArray(state.draft.slips)||!state.draft.slips.length)state.draft.slips=[blankSlip()]}catch(e){}}
function msg(t,cls){$('msg').innerHTML=t?'<div class="'+(cls||'ok')+'">'+esc(t)+'</div>':''}function formMsg(t,cls){var el=$('formMsg');if(el)el.innerHTML=t?'<div class="'+(cls||'ok')+'">'+esc(t)+'</div>':'';else msg(t,cls)}
function options(arr,val,ph){return '<option value="">'+esc(ph||'Select')+'</option>'+(arr||[]).map(function(x){return '<option '+(x===val?'selected':'')+'>'+esc(x)+'</option>'}).join('')}
function getDeviceId(){var k='hfqSlipProductionDeviceId';var v=localStorage.getItem(k);if(!v){v='DEV-'+uid();localStorage.setItem(k,v)}return v}function totalQty(){return (state.draft.slips||[]).reduce(function(sum,s){var n=parseFloat(String(s.qty||'').replace(',','.'));return sum+(isFinite(n)?n:0)},0)}function totalFmt(){return totalQty().toFixed(2).replace(/\.00$/,'')}
function setBusy(on,label){busy=!!on;Array.prototype.forEach.call(document.querySelectorAll('button'),function(b){b.disabled=busy});if(label)msg(label,'ok')}

function captureDraft(){['date','site','customer','material','unit','section','notes'].forEach(function(id){var el=$(id);if(el)state.draft[id]=el.value});(state.draft.slips||[]).forEach(function(s,i){['slipNo','qty'].forEach(function(f){var el=$(f+i);if(el)s[f]=el.value})});save()}
function bindDraftEvents(){['date','site','customer','material','unit','section','notes'].forEach(function(id){var el=$(id);if(el){el.oninput=function(){el.classList.remove('missed');captureDraft();renderTotalOnly()};el.onchange=function(){el.classList.remove('missed');captureDraft();renderTotalOnly()}}});(state.draft.slips||[]).forEach(function(s,i){['slipNo','qty'].forEach(function(f){var el=$(f+i);if(el){el.oninput=function(){el.classList.remove('missed');captureDraft();renderTotalOnly()};el.onchange=function(){el.classList.remove('missed');captureDraft();renderTotalOnly()}}})})}
function renderTotalOnly(){var el=$('totalVal');if(el)el.textContent=totalFmt();var unit=$('unit');var u=$('totalUnit');if(u&&unit)u.textContent=unit.value||''}
function markMissed(ids){var miss=[];ids.forEach(function(id){var el=$(id);if(el){var bad=!String(el.value||'').trim();el.classList.toggle('missed',bad);if(bad)miss.push(id)}});return miss}
function slipHtml(s,i){return '<div class="slipRow"><div class="slipTop"><b>Slip '+(i+1)+'</b><button class="danger" onclick="removeSlip('+i+')" '+((state.draft.slips||[]).length<=1?'disabled':'')+'>Remove</button></div><div class="slipGrid"><div><label>Slip No</label><input id="slipNo'+i+'" value="'+esc(s.slipNo||'')+'" placeholder="Optional / auto-read"></div><div><label>Slip Total Tons</label><input id="qty'+i+'" type="number" step="0.001" min="0" value="'+esc(s.qty||'')+'" placeholder="Total tons on this slip"></div><div class="wide"><label>Slip Photo</label><div class="row"><label style="margin:0"><span class="buttonLike">Take Photo</span><input id="photoCamera'+i+'" type="file" accept="image/*" capture="environment" style="display:none"></label><label style="margin:0"><span class="buttonLike secondaryLike">Add File</span><input id="photoFile'+i+'" type="file" accept="image/*" style="display:none"></label><button class="secondary" onclick="readSlipPhoto('+i+')" '+(!s.photoData?'disabled':'')+'>Read Slip</button></div><div class="photoPreview">'+(s.photoData?'<div style="position:relative;display:inline-block;margin-top:8px"><img src="'+s.photoData+'"><button type="button" onclick="removeSlipPhoto('+i+')" style="position:absolute;top:-8px;right:-8px;background:#dc2626;color:#fff;border-radius:999px;padding:6px 10px;font-size:12px;line-height:1;box-shadow:none">✕</button></div>':'')+'</div>'+(s.ocrStatus||s.ocrText?'<div class="ocrBox"><b>Read result</b><p class="small muted">'+esc(s.ocrStatus||'')+'</p><p class="small">'+esc(s.ocrText||'')+'</p></div>':'')+'</div></div></div>'}
function renderAdd(){if(!state.draft)state.draft={slips:[blankSlip()]};if(!state.draft.date)state.draft.date=todaySA();var d=state.draft;var slips=d.slips||[blankSlip()];var syncWarn=state.queue.length>=MAX_UNSYNCED_ENTRIES?'<div class="error">You have '+state.queue.length+' unsynced entries. Please Sync Queue before adding more.</div>':'';$('view').innerHTML=syncWarn+'<div class="grid"><section class="card"><h2>Crushing Production</h2><div class="two"><div><label>Production Date</label><input id="date" type="date" value="'+esc(state.draft.date)+'"></div><div><label>Site</label><select id="site">'+options(state.sites,d.site||state.lastForm.site,'Select site')+'</select></div><div><label>Customer</label><select id="customer">'+options(state.customers,d.customer||state.lastForm.customer,'Select customer')+'</select></div><div><label>Material</label><select id="material">'+options(state.materials,d.material||state.lastForm.material,'Select material')+'</select></div><div><label>Unit</label><select id="unit"><option value="">Select unit</option><option '+((d.unit||state.lastForm.unit||'Tons')==='m³'?'selected':'')+'>m³</option><option '+((d.unit||state.lastForm.unit)==='Tons'?'selected':'')+'>Tons</option></select></div><div><label>Section / Area</label><select id="section">'+options(state.sections,d.section||state.lastForm.section,'Select section')+'</select></div></div><label>Notes</label><textarea id="notes">'+esc(d.notes||'')+'</textarea></section><section class="card"><h2>Slip Totals</h2><p class="muted">Take a photo for each slip. Each slip must have its own <b>Total Tons</b>. The daily total is calculated from all slip totals.</p><div class="slipRows">'+slips.map(slipHtml).join('')+'</div><div class="row" style="margin-top:12px"><button class="secondary" onclick="addSlip()">+ Add Another Slip</button></div><div class="totalBox"><div class="label">Daily Total Tons</div><div class="total"><span id="totalVal">'+totalFmt()+'</span> <span id="totalUnit">'+esc(d.unit||state.lastForm.unit||'Tons')+'</span></div></div></section><section class="card"><div id="formMsg"></div><button id="saveBtn" class="good" onclick="saveProduction()" '+(state.queue.length>=MAX_UNSYNCED_ENTRIES?'disabled':'')+'>Save Daily Production / Queue</button></section></div>';bindDraftEvents();bindPhotoInputs()}
function bindPhotoInputs(){(state.draft.slips||[]).forEach(function(s,i){['photoCamera','photoFile'].forEach(function(prefix){var pi=$(prefix+i);if(!pi)return;pi.onchange=function(){var f=pi.files&&pi.files[0];if(!f)return;captureDraft();resizeImageFile(f,function(dataUrl){state.draft.slips[i].photoData=dataUrl;state.draft.slips[i].ocrStatus='Photo added. Press Read Slip to extract info, or type qty manually.';save();renderAdd()})}})})}
function resizeImageFile(file,cb){var reader=new FileReader();reader.onload=function(ev){var img=new Image();img.onload=function(){var max=700,w=img.width,h=img.height;if(w>h&&w>max){h=Math.round(h*max/w);w=max}else if(h>=w&&h>max){w=Math.round(w*max/h);h=max}var canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;var ctx=canvas.getContext('2d');ctx.drawImage(img,0,0,w,h);cb(canvas.toDataURL('image/jpeg',0.45))};img.onerror=function(){cb(ev.target.result)};img.src=ev.target.result};reader.readAsDataURL(file)}
window.addSlip=function(){captureDraft();state.draft.slips.push(blankSlip());save();renderAdd()};window.removeSlip=function(i){captureDraft();if(state.draft.slips.length>1)state.draft.slips.splice(i,1);save();renderAdd()};window.removeSlipPhoto=function(i){captureDraft();state.draft.slips[i].photoData='';state.draft.slips[i].ocrText='';state.draft.slips[i].ocrStatus='Photo removed.';save();renderAdd()};
function parseReadResult(text){var out={};var t=String(text||'');var total=t.match(/Total\s+(\d+(?:[\.,]\d+)?)\s*(?:tons?|ton|t)/i)||t.match(/(?:total|net)\D{0,20}(\d+(?:[\.,]\d+)?)\s*(?:tons?|ton|t)/i);if(total)out.qty=total[1].replace(',','.');if(!out.qty){var tons=[].slice.call(t.matchAll(/(\d+(?:[\.,]\d+)?)\s*(?:tons?|ton|t)/gi)).map(function(m){return parseFloat(String(m[1]).replace(',','.'))}).filter(function(n){return isFinite(n)});if(tons.length)out.qty=String(Math.max.apply(null,tons));}var slip=t.match(/(?:slip|ticket|weighbridge|wb|doc|id)\D{0,12}([A-Z0-9\-\/]+)/i);if(slip)out.slipNo=slip[1];return out}
function cleanQtyValue(v){
 if(v==null)return '';
 if(typeof v==='number'&&isFinite(v))return v;
 var str=String(v).replace(',', '.').replace(/[^0-9.\-]/g,'');
 var n=parseFloat(str);
 return isFinite(n)?n:'';
}
function firstGoodQty(){
 for(var a=0;a<arguments.length;a++){
   var n=cleanQtyValue(arguments[a]);
   if(n!=='' && n>0)return n;
 }
 return '';
}
window.readSlipPhoto=function(i){
 captureDraft();
 var s=state.draft.slips[i];
 if(!s||!s.photoData){formMsg('Add a slip photo first.','error');return}
 if(!navigator.onLine){s.ocrStatus='Cannot read slip while offline. Save manually or try again online.';save();renderAdd();return}

 api({action:'readSlipPhoto',photoData:s.photoData,site:state.draft.site||'',material:state.draft.material||''}).then(function(res){
   if(!res.ok)throw new Error(res.error||'Read failed');
   var text=res.rawText||res.text||res.ocrText||'';
   var parsed=parseReadResult(text);
   var data=res.data||res.result||{};
   var qty=firstGoodQty(res.totalTons,res.slipTotalTons,res.slipTotal,res.total,res.qty,res.quantity,data.totalTons,data.slipTotalTons,data.slipTotal,data.total,data.qty,parsed.qty);
   var slipNo=res.slipNo||res.slipNumber||data.slipNo||data.slipNumber||parsed.slipNo||'';
   if(slipNo)s.slipNo=slipNo;
   if(qty!==''){
     s.qty=Number(qty).toFixed(3).replace(/\.?0+$/,'');
     var qtyEl=document.getElementById('qty'+i);
     if(qtyEl)qtyEl.value=s.qty;
   }
   s.ocrText=text;
   s.ocrStatus=qty!==''?'Slip read. Total tons filled in: '+s.qty+' Tons. Please check before saving.':'Slip read, but total tons could not be detected. Type it manually.';
   save();
   renderAdd();
   formMsg(qty!==''?'Slip read and total tons filled in: '+s.qty+' Tons.':'Slip read but total tons was not found. Type total tons manually.','ok');
 }).catch(function(e){
   s.ocrStatus='Slip read failed: '+e.message+'. You can still type the slip qty manually.';
   save();renderAdd();formMsg('Read failed. You can still type qty manually.','error')
 }).finally(function(){setBusy(false)})
};
window.saveProduction=function(){if(busy)return;if(state.queue.length>=MAX_UNSYNCED_ENTRIES){show('sync');return}captureDraft();var dateField=$('date');if(dateField&&!dateField.value){dateField.value=todaySA();state.draft.date=dateField.value;save()}var miss=markMissed(['date','site','customer','material','unit','section']);var slips=(state.draft.slips||[]).filter(function(s){return String(s.qty||'').trim()||String(s.slipNo||'').trim()||s.photoData});if(!slips.length){formMsg('Add at least one slip total.','error');return}slips.forEach(function(s,i){if(!String(s.qty||'').trim())miss.push('qty'+i)});if(miss.length){formMsg('Please complete red highlighted fields. Every slip needs its total tons.','error');return}var total=totalQty();if(total<=0){formMsg('Total production must be more than 0.','error');return}var rec={id:uid(),serialNo:'',productionDate:(dateField&&dateField.value)||todaySA(),site:$('site').value,customer:$('customer').value,material:$('material').value,unit:$('unit').value,section:$('section').value,notes:$('notes').value.trim(),slips:JSON.parse(JSON.stringify(slips)),slipCount:slips.length,totalQty:total,qty:total,createdAt:nowSA(),updatedAt:nowSA(),deviceId:getDeviceId()};state.entries.unshift(rec);state.queue.push({id:uid(),action:'saveProduction',payload:rec,createdAt:nowSA(),status:'Queued'});state.lastForm={site:rec.site,customer:rec.customer,material:rec.material,unit:rec.unit,section:rec.section};state.draft={date:todaySA(),site:rec.site,customer:rec.customer,material:rec.material,unit:rec.unit,section:rec.section,notes:'',slips:[blankSlip()]};save();msg('Daily production saved locally and queued for sync. Total: '+totalFmt()+' '+rec.unit,'ok');renderAdd()};
function renderEntries(){var list=(state.entries||[]).map(function(e){return '<div class="item"><div class="row"><b>'+esc(e.serialNo||'Pending serial')+'</b><span class="status pending">'+esc(e.slipCount||((e.slips||[]).length))+' slips</span></div><p><b>'+esc(e.site)+'</b> • '+esc(e.productionDate)+' • '+esc(e.customer)+'</p><p class="muted">'+esc(e.material)+' • Total '+esc(e.totalQty||e.qty)+' '+esc(e.unit)+' • '+esc(e.section)+'</p><details><summary>View slip amounts</summary>'+(e.slips||[]).map(function(s,idx){return '<p class="small">Slip '+(idx+1)+': '+esc(s.slipNo||'No slip no')+' • '+esc(s.qty)+' '+esc(e.unit)+(s.photoUrl?' • <a target="_blank" href="'+esc(s.photoUrl)+'">photo</a>':'')+'</p>'}).join('')+'</details></div>'}).join('')||'<div class="card"><p>No entries yet.</p></div>';$('view').innerHTML='<div class="grid"><section class="card"><h2>Entries</h2><div class="list">'+list+'</div></section></div>'}
function renderSync(){$('view').innerHTML='<div class="grid"><section class="card"><h2>Sync</h2><p class="muted">Google Sheets is master. Download masters before capture. Queue uploads when online.</p><div class="quickStats"><div class="stat"><div class="num">'+state.entries.length+'</div><div class="lbl">Entries</div></div><div class="stat"><div class="num">'+state.queue.length+'</div><div class="lbl">Pending</div></div><div class="stat"><div class="num">'+Math.max(0,state.entries.length-state.queue.length)+'</div><div class="lbl">Synced</div></div></div><div class="row"><button class="secondary" onclick="downloadMasters()">Download Masters</button><button class="good" onclick="syncNow()">Sync Queue</button></div><p class="muted">Queue entries: '+state.queue.length+' / '+MAX_UNSYNCED_ENTRIES+'</p></section><section class="card"><h2>Queue</h2><div class="list">'+(state.queue.map(function(q){return '<div class="item"><b>'+esc(q.action)+'</b><p class="muted">'+esc(q.createdAt)+' • '+esc(q.status)+'</p></div>'}).join('')||'<p>No queue entries.</p>')+'</div></section></div>'}
function api(data){return fetch(HARD_CODED_SCRIPT_URL,{method:'POST',body:JSON.stringify(data)}).then(function(r){return r.text()}).then(function(t){try{return JSON.parse(t)}catch(e){throw new Error(t)}})}
window.downloadMasters=function(){if(busy)return;setBusy(true,'Downloading masters...');api({action:'getMasters'}).then(function(res){if(!res.ok)throw new Error(res.error||'Download failed');state.customers=res.customers||[];state.materials=res.materials||[];state.sections=res.sections||[];state.sites=res.sites||[];state.entries=res.entries||state.entries||[];save();render();msg('Masters downloaded.','ok')}).catch(function(e){msg('Download failed: '+e.message,'error')}).finally(function(){setBusy(false)})};
window.syncNow=function(){if(busy)return;if(!state.queue.length){msg('Nothing to sync.','ok');return}setBusy(true,'Syncing queue...');api({action:'syncQueue',queue:state.queue.slice()}).then(function(res){if(!res.ok)throw new Error(res.error||'Sync failed');state.queue=[];if(res.entries)state.entries=res.entries;save();render();msg('Sync complete.','ok')}).catch(function(e){msg('Sync failed: '+e.message,'error')}).finally(function(){setBusy(false)})};
window.addEventListener('error',function(e){msg('App error: '+String(e.message||e),'error')});load();render();if('serviceWorker'in navigator){navigator.serviceWorker.register('service-worker.js?v=crushing-2').catch(function(){})}
})();</script></body></html>
