        saveCredentialBackup();

        if(!state.apiUrl) state.apiUrl = HARDCODED_API_URL;

        const response = await fetch(state.apiUrl, {
          method:'POST',
          headers:{ 'Content-Type':'text/plain;charset=utf-8' },
          body: JSON.stringify({ action:'login', data:{ username, pin } })
        });

        const text = await response.text();
        let json;
        try { json = JSON.parse(text); } catch(e) { throw new Error(explainInvalidJsonResponse_(text, 'Could not login.')); }
        if(!json.ok) throw new Error(json.message || 'Login failed');

        state.token = json.token;
        state.user = json.user;
        state.sessionExpiresAt = '';
      state.lastLoginValidationDate = todaySAKey_();
        state.browserNotificationsEnabled = true;
        saveLocal();

        await refreshFromBackend(true);
        await autoEnablePushIfPossible_(true);
        await syncExistingPushSubscription();

        if (loginBtn) {
          loginBtn.disabled = false;
          loginBtn.textContent = 'Login';
        }
        if (banner) {
          banner.className = 'banner info';
          banner.textContent = 'Login to continue.';
        }
      } catch(err) {
        if (banner) {
          banner.className='banner error';
          banner.textContent = err.message;
        }
        if (loginBtn) {
          loginBtn.disabled = false;
          loginBtn.textContent = 'Login';
        }
      }
    }

    async function logout(){
      stopAutoSync();
      stopSessionWatcher();
      try { await removeExistingPushSubscriptionFromServer(); } catch (e) {}
      state.token='';
      state.user=null;
      state.savedUsername='';
      state.savedPin='';
      clearCredentialBackup();
      state.notificationsOpen=false;
      state.pendingBlinkId='';
      state.lastSyncAt='';
      saveLocal();
      clearLocal();
      document.getElementById('appView').classList.add('hidden');
      document.getElementById('loginView').classList.remove('hidden');
      const banner = document.getElementById('loginBanner');
      const loginBtn = document.getElementById('loginBtn');
      if (banner) {
        banner.className='banner info';
        banner.textContent='Login to continue.';
      }
      restoreLoginInputs();
      if (loginBtn) {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
      }
      updateSyncState();
    }

    document.getElementById('loginBtn').addEventListener('click', login);
    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('refreshBtn').addEventListener('click', async()=>{ try{ await flushPendingOperations(); await refreshFromBackend(true, { skipQueueFlush: true }); setBanner('Data refreshed.','ok'); } catch(err){ setBanner(err.message,'error'); } });

    registerServiceWorker();
    bindInstallPrompt();
    bindSessionResumeWatcher();
    async function startApp_(){
      loadLocal();
      try { await migrateLocalStorageToIndexedDb_(); } catch(e) { console.warn('IndexedDB migration failed', e); }
      bindAntiJumpGuards_();
      const customNoticeFromUrl = getCustomNotificationOpenParam_();
      const notificationTxFromUrl = getNotificationOpenParam_();
      if (notificationTxFromUrl) storePendingNotificationOpen_(notificationTxFromUrl);
      restoreLoginInputs();
      document.getElementById('loginApiUrl').value = HARDCODED_API_URL;
      if ('serviceWorker' in navigator && navigator.serviceWorker) {
        navigator.serviceWorker.addEventListener('message', async function(event){
          const data = event && event.data ? event.data : {};
          if (data.type === 'PETTY_CASH_NOTIFICATION_CLICK') {
            storePendingNotificationOpen_(data.transactionId || '');
            try { await openTransactionFromPush_(data.transactionId || '', { skipRefresh: true }); } catch (e) {}
            return;
          }
          if (data.type !== 'PETTY_CASH_PUSH') return;
          try {
            if (!data.transactionId && data.body) {
              storeCustomNotification_(data.title || 'Petty cash message', data.body || '', { sentAt: data.sentAt || nowSAIso(), sentByName: data.sentByName || 'Admin' });
              renderTopNotifications();
              return;
            }
            if (state && state.token && canReachServer()) await refreshFromBackend(false, { silent: true, skipQueueFlush: true, skipPendingNotificationOpen: true });
            else renderTopNotifications();
          } catch (e) {
            try { renderTopNotifications(); } catch (inner) {}
          }
        });
      }
      initFirebaseMessaging().catch(()=>{});
      if((sessionValid() || (state.savedUsername && state.savedPin)) && state.user && state.apiUrl){
        renderApp();
        refreshFromBackend(true).catch(()=>{ updateSyncState(); renderApp(); });
        resumeSessionIfNeeded_().catch(()=>{});
      }
      else if(state.apiUrl && state.savedUsername && state.savedPin){
        keepSessionAlive_({ showErrors: false }).then(function(ok){
          if(ok && state.user){
            renderApp();
            refreshFromBackend(true).catch(()=>{ updateSyncState(); renderApp(); });
          } else {
            state.token=''; state.user=null; state.sessionExpiresAt=''; state.lastSyncAt=''; saveLocal();
            showLoginView_('Login to continue.', 'info');
          }
        }).catch(function(){
          state.token=''; state.user=null; state.sessionExpiresAt=''; state.lastSyncAt=''; saveLocal();
          showLoginView_('Login to continue.', 'info');
        });
      } else {
        showLoginView_('Login to continue.', 'info');
      }
    }
    startApp_().catch(function(err){ console.error(err); });
  </script>
</body>
</html>
